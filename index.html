<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Simulasi Kristal Trigonal</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<header>
			<h1>Simulasi Kristal Trigonal</h1>
			<p class="subtitle">Interaktif — ubah parameter kisi untuk melihat struktur 3D</p>
		</header>
		<main>
			<div id="viewer">
				<canvas id="c"></canvas>
			</div>
			<aside id="controls">
				<h2>Kontrol</h2>
				<label>A (Å)
					<input id="aRange" type="range" min="1" max="5" step="0.1" value="3">
					<span id="aVal">3.0</span>
				</label>
				<label>C (Å)
					<input id="cRange" type="range" min="1" max="8" step="0.1" value="5">
					<span id="cVal">5.0</span>
				</label>
				<label>Atom radius
					<input id="rRange" type="range" min="0.05" max="0.6" step="0.01" value="0.18">
					<span id="rVal">0.18</span>
				</label>
				<label>
					<input id="showCell" type="checkbox" checked>
					Tampilkan sel satuan
				</label>
				<label>
					<input id="showAtoms" type="checkbox" checked>
					Tampilkan atom
				</label>
				<div class="controls-row">
					<button id="resetBtn">Reset view</button>
					<button id="downloadBtn">Unduh PNG</button>
				</div>
				<div class="params">
					<strong>Parameter kisi</strong>
					<p>A = <span id="dispA">3.0</span> Å • C = <span id="dispC">5.0</span> Å • r = <span id="dispR">0.18</span></p>
				</div>
				<p class="credits">Gunakan mouse untuk memutar/zoom, dan kontrol di atas untuk mengubah kisi.</p>
			</aside>
		</main>

		<script src="three.min.js"></script>
		<script src="OrbitControls.js"></script>
		<script src="script.js"></script>
	</body>
</html>
